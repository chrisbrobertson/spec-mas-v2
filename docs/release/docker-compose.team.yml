services:
  api:
    image: node:22-alpine
    container_name: specmas-api
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      corepack pnpm install --frozen-lockfile &&
      DATABASE_URL=${DATABASE_URL:-file:./specmas.db} corepack pnpm db:bootstrap &&
      API_HOST=0.0.0.0 API_PORT=3100 CORS_ORIGIN=http://web:3000 corepack pnpm --filter @specmas/api dev"
    volumes:
      - ../..:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:./specmas.db}
      API_HOST: 0.0.0.0
      API_PORT: 3100
      CORS_ORIGIN: http://web:3000
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3100/health >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  web:
    image: node:22-alpine
    container_name: specmas-web
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      corepack pnpm install --frozen-lockfile &&
      VITE_API_BASE_URL=/api corepack pnpm --filter @specmas/web dev --host 0.0.0.0 --port 3000"
    volumes:
      - ../..:/workspace
    environment:
      VITE_API_BASE_URL: /api
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3000 >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  proxy:
    image: nginx:1.27-alpine
    container_name: specmas-proxy
    ports:
      - '3000:80'
    volumes:
      - ./nginx.team.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost/healthz >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  sqlite-web:
    image: coleifer/sqlite-web:0.6.4
    container_name: specmas-sqlite-web
    command: ['/data/specmas.db', '--host', '0.0.0.0', '--port', '8080']
    ports:
      - '8080:8080'
    volumes:
      - ../../prisma:/data
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: specmas-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'
    restart: unless-stopped
